<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LandlordGuru</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Login screen — shown when not authenticated -->
<div id="login-screen" style="display:none">
  <div class="login-card">
    <h1>LandlordGuru</h1>
    <p>Sign in with your Google account</p>
    <a href="/auth/google" class="btn btn-primary" style="display:inline-block;padding:0.75rem 1.5rem;margin-top:1rem">
      Sign in with Google
    </a>
  </div>
</div>

<div id="app">

  <header>
    <span class="app-title" data-i18n="app.header"></span>
    <nav>
      <button class="active" onclick="showPage('dashboard',this)"    data-i18n="nav.dashboard"></button>
      <button onclick="showPage('transactions',this)"                 data-i18n="nav.transactions"></button>
      <button onclick="showPage('import',this)"                       data-i18n="nav.import"></button>
      <button onclick="showPage('reports',this)"                      data-i18n="nav.reports"></button>
      <button onclick="showPage('properties',this)"                   data-i18n="nav.properties"></button>
      <button onclick="showPage('rules',this)"                        data-i18n="nav.rules"></button>
    </nav>
    <div class="header-right">
      <div class="user-menu-wrapper">
        <button id="user-avatar" class="user-avatar" onclick="toggleUserMenu()" title="User menu"></button>
        <div id="user-menu" class="user-menu">
          <button class="user-menu-item" onclick="logout()">Sign out</button>
          <button class="user-menu-item" onclick="closeUserMenu(); showPage('settings', null);">Settings</button>
          <button class="user-menu-item" onclick="closeUserMenu(); refreshAll();">Refresh</button>
          <div class="user-menu-item info" id="sync-info">Synced 0 min ago</div>
        </div>
      </div>
    </div>
  </header>

  <main>

    <!-- ── DASHBOARD ── -->
    <div id="page-dashboard" class="page active">
      <div class="metric-grid" id="dash-metrics"></div>
      <div class="apt-grid"    id="dash-apt-cards"></div>
      <div class="card">
        <div class="card-header">
          <span class="card-title" data-i18n="dashboard.recentTx"></span>
          <button class="btn btn-sm btn-secondary"
            onclick="showPage('transactions', document.querySelector('nav button:nth-child(2)'))"
            data-i18n="dashboard.viewAll"></button>
        </div>
        <div class="table-wrap">
          <table><thead><tr>
            <th data-i18n="tx.col.date"></th>
            <th data-i18n="tx.col.property"></th>
            <th data-i18n="tx.col.description"></th>
            <th data-i18n="tx.col.category"></th>
            <th class="amount-cell" data-i18n="tx.col.amount"></th>
          </tr></thead>
          <tbody id="dash-recent-tx"></tbody></table>
        </div>
      </div>
    </div>

    <!-- ── TRANSACTIONS ── -->
    <div id="page-transactions" class="page">
      <div class="card">
        <div id="tx-sticky-header">
          <div class="card-header" id="tx-card-header">
            <span class="card-title" data-i18n="tx.title"></span>
            <div id="tx-pagination" style="flex:1; display:flex; gap:4px; align-items:center; padding:0 16px;"></div>
            <div style="display:flex;gap:8px;align-items:center">
              <span id="tx-bulk-bar" style="display:none;gap:8px;align-items:center;display:none">
                <span id="tx-bulk-count" style="font-size:13px;color:var(--text2)"></span>
                <button class="btn btn-sm btn-danger" onclick="bulkDeleteTx()" data-i18n="tx.bulkDelete"></button>
              </span>
              <button class="btn btn-sm btn-primary" onclick="openTxModal()" data-i18n="tx.addBtn"></button>
            </div>
          </div>

          <div class="filter-bar">
            <select id="tx-filter-apt" onchange="resetAndRenderTxTable()">
              <option value="all" data-i18n="tx.filter.allProperties"></option>
            </select>
            <select id="tx-filter-type" onchange="updateCategoryFilter(); resetAndRenderTxTable()">
              <option value="all"      data-i18n="tx.filter.allTypes"></option>
              <option value="income"   data-i18n="categories.income"></option>
              <option value="expense"  data-i18n="categories.expense"></option>
              <option value="deposit"  data-i18n="categories.deposit"></option>
              <option value="transfer" data-i18n="categories.transfer"></option>
            </select>
            <select id="tx-filter-cat" onchange="resetAndRenderTxTable()">
              <option value="all" data-i18n="tx.filter.allCats"></option>
            </select>
            <input type="date"   id="tx-filter-from"   onchange="resetAndRenderTxTable()" data-i18n-title="tx.col.date">
            <input type="date"   id="tx-filter-to"     onchange="resetAndRenderTxTable()" data-i18n-title="tx.col.date">
            <input type="search" id="tx-filter-search" oninput="resetAndRenderTxTable()"  data-i18n-placeholder="common.search">
            <button class="btn btn-sm btn-secondary" onclick="clearTxFilters()" data-i18n="common.clear"></button>
            <label id="tx-converted-toggle-wrap" style="display:none;align-items:center;gap:6px;font-size:13px;cursor:pointer;color:var(--text2)">
              <input type="checkbox" id="tx-show-converted" onchange="renderTxTable()">
              <span id="tx-converted-label"></span>
            </label>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th style="width:32px"><input type="checkbox" id="tx-select-all" onchange="txSelectAll(this.checked)" title="Select all"></th>
              <th class="sortable" onclick="setTxSort('date')" data-i18n="tx.col.date"></th>
              <th data-i18n="tx.col.property"></th>
              <th data-i18n="tx.col.type"></th>
              <th data-i18n="tx.col.category"></th>
              <th data-i18n="tx.col.description"></th>
              <th data-i18n="tx.col.source"></th>
              <th class="amount-cell sortable" onclick="setTxSort('amount')" data-i18n="tx.col.amount"></th>
              <th></th>
            </tr></thead>
            <tbody id="tx-table-body"></tbody>
          </table>
        </div>
        <div id="tx-empty" class="empty-state" style="display:none">
          <strong data-i18n="tx.noTx"></strong>
          <span   data-i18n="tx.noTxSub"></span>
        </div>
        <div id="tx-footer" style="padding:10px 10px 0; font-size:12px; color:var(--text3)"></div>
      </div>
    </div>

    <!-- ── IMPORT ── -->
    <div id="page-import" class="page">

      <div class="card">
        <div class="card-header"><span class="card-title" data-i18n="import.title"></span></div>

        <div class="form-grid cols-3" style="margin-bottom:1rem">
          <div class="form-group">
            <label data-i18n="import.bankProfile"></label>
            <select id="import-profile" onchange="onProfileChange()">
              <option value="jyske_bank">Jyske Bank (DK)</option>
              <option value="nordea_dk">Nordea (DK)</option>
              <option value="mbank_pl">mBank (PL)</option>
              <option value="generic_csv">Generic CSV</option>
            </select>
          </div>
          <div class="form-group">
            <label data-i18n="import.defaultProp"></label>
            <select id="import-apt">
              <option value="" data-i18n="import.autoDetect"></option>
            </select>
          </div>
          <div class="form-group" id="import-currency-group" style="display:none">
            <label data-i18n="import.currency"></label>
            <select id="import-currency">
              <option value="DKK">DKK</option>
              <option value="PLN">PLN</option>
              <option value="EUR">EUR</option>
            </select>
          </div>
        </div>

        <!-- File drop zone (primary) -->
        <div id="import-zone" class="import-zone"
          onclick="document.getElementById('import-file').click()"
          ondragover="onImportDragOver(event)"
          ondragleave="onImportDragLeave(event)"
          ondrop="onImportDrop(event)">
          <strong data-i18n="import.dropZone"></strong>
          <span id="import-file-name" class="file-name" style="display:none"></span>
          <input type="file" id="import-file" accept=".csv,.txt" style="display:none"
            onchange="onImportFileChange(event)">
        </div>

        <!-- Paste toggle -->
        <div class="import-paste-toggle">
          <a onclick="toggleImportPaste()" id="import-paste-link" data-i18n="import.pasteToggle"></a>
        </div>

        <!-- Paste area (secondary, hidden by default) -->
        <div id="import-paste-area" style="display:none;margin-bottom:1rem">
          <div class="form-group">
            <label data-i18n="import.csvLabel"></label>
            <textarea id="import-csv" rows="8" data-i18n-placeholder="import.csvPlaceholder"></textarea>
          </div>
        </div>

        <!-- Column mapping panel (shown after CSV loaded) -->
        <div id="import-mapping-section" style="display:none;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;margin-bottom:1rem;background:var(--bg2)">

          <!-- Saved mappings row -->
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:1rem">
            <label style="font-size:13px;font-weight:500;white-space:nowrap" data-i18n="import.mapping.savedLabel"></label>
            <select id="mapping-saved-select" style="font-size:13px;flex:1" onchange="loadSavedMapping()">
              <option value="" data-i18n="import.mapping.noSaved"></option>
            </select>
            <button class="btn btn-sm btn-danger" onclick="deleteSavedMapping()" data-i18n="import.mapping.deleteBtn"></button>
          </div>

          <!-- Column assignment table -->
          <div class="table-wrap" style="margin-bottom:1rem">
            <table style="font-size:13px">
              <thead><tr>
                <th data-i18n="import.mapping.colHeader"></th>
                <th data-i18n="import.mapping.colSample"></th>
                <th data-i18n="import.mapping.colRole"></th>
              </tr></thead>
              <tbody id="mapping-table-body"></tbody>
            </table>
          </div>

          <!-- Format options -->
          <div class="form-grid cols-4" style="margin-bottom:1rem">
            <div class="form-group">
              <label style="font-size:12px" data-i18n="import.mapping.skipRows"></label>
              <input type="number" id="mapping-skip-rows" value="1" min="0" style="width:70px;font-size:13px">
            </div>
            <div class="form-group">
              <label style="font-size:12px" data-i18n="import.mapping.dateFormat"></label>
              <select id="mapping-date-format" style="font-size:13px">
                <option value="DD.MM.YYYY">DD.MM.YYYY</option>
                <option value="DD-MM-YYYY">DD-MM-YYYY</option>
                <option value="DD/MM/YYYY">DD/MM/YYYY</option>
                <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                <option value="MM/DD/YYYY">MM/DD/YYYY</option>
              </select>
            </div>
            <div class="form-group">
              <label style="font-size:12px" data-i18n="import.mapping.decimal"></label>
              <select id="mapping-decimal" style="font-size:13px">
                <option value=",">, (comma)</option>
                <option value=".">. (period)</option>
              </select>
            </div>
            <div class="form-group">
              <label style="font-size:12px" data-i18n="import.currency"></label>
              <select id="mapping-currency-sel" style="font-size:13px">
                <option value="DKK">DKK</option>
                <option value="PLN">PLN</option>
                <option value="EUR">EUR</option>
                <option value="USD">USD</option>
              </select>
            </div>
          </div>

          <!-- Save mapping -->
          <div style="display:flex;gap:8px;align-items:center;border-top:1px solid var(--border);padding-top:0.75rem">
            <input id="mapping-name-input" type="text" style="flex:1;font-size:13px"
              data-i18n-placeholder="import.mapping.namePlaceholder">
            <button class="btn btn-secondary btn-sm" onclick="saveCurrentMapping()" data-i18n="import.mapping.saveBtn"></button>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" onclick="runImportPreview()" data-i18n="import.previewBtn"></button>
          <button class="btn btn-secondary btn-sm" onclick="clearImport()" data-i18n="import.clearBtn"></button>
        </div>
      </div>

      <!-- Step 1: Edit Preview -->
      <div id="import-preview-section" style="display:none">
        <div class="card">
          <div class="card-header" id="import-preview-header">
            <span class="card-title" id="import-preview-title"></span>
            <div class="btn-row" style="align-items:center">
              <label style="font-size:12px;display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap">
                <input type="checkbox" id="bulk-update-toggle">
                <span data-i18n="import.bulkUpdate"></span>
              </label>
              <label style="font-size:12px;display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap">
                <input type="checkbox" id="select-same-desc-toggle">
                <span data-i18n="import.selectSameDesc"></span>
              </label>
              <button class="btn btn-primary" onclick="goToStaticPreview()" data-i18n="import.nextReview"></button>
              <button class="btn btn-secondary btn-sm" onclick="clearImport()" data-i18n="common.cancel"></button>
            </div>
          </div>
          <p style="font-size:12px;color:var(--text3);margin-bottom:1rem" data-i18n="import.reviewNote"></p>
          <div class="table-wrap" id="import-table-scroll">
            <table>
              <thead><tr>
                <th style="width:28px"><input type="checkbox" id="select-all-cb" onclick="toggleSelectAll(this)"></th>
                <th data-i18n="import.col.date"></th>
                <th data-i18n="import.col.description"></th>
                <th data-i18n="import.col.property"></th>
                <th data-i18n="import.col.category"></th>
                <th data-i18n="import.col.notes"></th>
                <th class="amount-cell" data-i18n="import.col.amount"></th>
                <th style="text-align:center" data-i18n="import.col.ignore"></th>
                <th style="text-align:center" data-i18n="import.col.storeMapping"></th>
              </tr></thead>
              <tbody id="import-preview-body"></tbody>
            </table>
          </div>
          <div id="import-errors" style="margin-top:1rem"></div>
        </div>
      </div>

      <!-- Step 2: Static Preview -->
      <div id="import-static-section" style="display:none">
        <div class="card">
          <div class="card-header" id="import-static-header">
            <span class="card-title" data-i18n="import.staticPreview.title"></span>
            <div class="btn-row">
              <button class="btn btn-secondary btn-sm" onclick="backToEditPreview()" data-i18n="import.staticPreview.back"></button>
              <button class="btn btn-primary" id="static-next-btn" onclick="goToMappingConfirmOrImport()"></button>
            </div>
          </div>
          <div id="import-static-body" style="padding:0.5rem 0"></div>
        </div>
      </div>

      <!-- Step 3: Mapping Confirmation -->
      <div id="import-mapping-confirm-section" style="display:none">
        <div class="card">
          <div class="card-header">
            <span class="card-title" data-i18n="import.mappingConfirm.title"></span>
            <div class="btn-row">
              <button class="btn btn-secondary btn-sm" onclick="backToStaticPreview()" data-i18n="import.mappingConfirm.back"></button>
              <button class="btn btn-primary" onclick="doImport(true)" data-i18n="import.mappingConfirm.confirmBtn"></button>
              <button class="btn btn-secondary btn-sm" onclick="doImport(false)" data-i18n="import.mappingConfirm.skipBtn"></button>
            </div>
          </div>
          <div id="import-mapping-confirm-body" style="padding:0.5rem 0"></div>
        </div>
      </div>
    </div>

    <!-- ── REPORTS ── -->
    <div id="page-reports" class="page">

      <div class="filter-bar" style="margin-bottom:1.25rem">
        <select id="rep-apt" onchange="renderReports()">
          <option value="all" data-i18n="tx.filter.allProperties"></option>
        </select>
        <select id="rep-year" onchange="setReportYear(this.value)"><option value="">— Year —</option></select>
        <input type="date" id="rep-from" onchange="document.getElementById('rep-year').value=''; renderReports()">
        <input type="date" id="rep-to"   onchange="document.getElementById('rep-year').value=''; renderReports()">
        <button class="btn btn-sm btn-secondary" onclick="setReportPeriod('ytd')"      data-i18n="reports.ytd"></button>
        <button class="btn btn-sm btn-secondary" onclick="setReportPeriod('lastyear')" data-i18n="reports.lastYear"></button>
        <button class="btn btn-sm btn-secondary" onclick="setReportPeriod('all')"      data-i18n="reports.allTime"></button>
      </div>

      <div class="metric-grid" id="rep-metrics"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="reports.incomeByCat"></span></div>
          <table>
            <thead><tr>
              <th data-i18n="reports.col.category"></th>
              <th class="amount-cell" data-i18n="reports.col.amount"></th>
              <th class="amount-cell" data-i18n="reports.col.count"></th>
            </tr></thead>
            <tbody id="rep-income-cats"></tbody>
          </table>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="reports.expensesByCat"></span></div>
          <table>
            <thead><tr>
              <th data-i18n="reports.col.category"></th>
              <th class="amount-cell" data-i18n="reports.col.amount"></th>
              <th class="amount-cell" data-i18n="reports.col.count"></th>
            </tr></thead>
            <tbody id="rep-expense-cats"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title" data-i18n="reports.pnlByProperty"></span></div>
        <table>
          <thead><tr>
            <th data-i18n="reports.col.property"></th>
            <th class="amount-cell" data-i18n="reports.col.income"></th>
            <th class="amount-cell" data-i18n="reports.col.expenses"></th>
            <th class="amount-cell" data-i18n="reports.col.net"></th>
          </tr></thead>
          <tbody id="rep-pnl-apt"></tbody>
        </table>
      </div>
    </div>

    <!-- ── PROPERTIES ── -->
    <div id="page-properties" class="page">
      <div class="card-header" style="margin-bottom:1rem">
        <span style="font-size:15px;font-weight:500" data-i18n="property.title"></span>
        <button class="btn btn-primary btn-sm" onclick="openPropertyModal()" data-i18n="property.addBtn"></button>
      </div>
      <div id="apt-list"></div>
    </div>

    <!-- ── RULES ── -->
    <div id="page-rules" class="page">
      <div class="card">
        <div class="card-header">
          <span class="card-title" data-i18n="rules.title"></span>
          <button class="btn btn-primary btn-sm" onclick="openRuleModal()" data-i18n="rules.addBtn"></button>
        </div>
        <p style="font-size:12px;color:var(--text3);margin-bottom:1rem" data-i18n="rules.description"></p>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th data-i18n="rules.col.bankProfile"></th>
              <th data-i18n="rules.col.keyword"></th>
              <th data-i18n="rules.col.category"></th>
              <th data-i18n="rules.col.property"></th>
              <th></th>
            </tr></thead>
            <tbody id="rules-body"></tbody>
          </table>
        </div>
        <div id="rules-empty" class="empty-state" style="display:none">
          <strong data-i18n="rules.noRules"></strong>
          <span   data-i18n="rules.noRulesSub"></span>
        </div>
        <div class="btn-row" style="margin-top:1rem">
          <button class="btn btn-secondary btn-sm" onclick="saveRules()" data-i18n="rules.saveOrder"></button>
        </div>
      </div>

      <div class="card" style="margin-top:1rem">
        <div class="card-header"><span class="card-title" data-i18n="rules.defaultTitle"></span></div>
        <p style="font-size:12px;color:var(--text3);margin-bottom:1rem" data-i18n="rules.defaultDesc"></p>
        <button class="btn btn-secondary btn-sm" onclick="loadDefaultRules()" data-i18n="rules.loadDefault"></button>
      </div>
    </div>

    <!-- ── SETTINGS ── -->
    <div id="page-settings" class="page">
      <div class="card">
        <div class="card-header">
          <span class="card-title" data-i18n="settings.title"></span>
        </div>
        <form id="settings-form" onsubmit="saveSettings(event)">
          <div class="form-group">
            <label for="settings-currency" data-i18n="settings.reportingCurrency"></label>
            <input type="text" id="settings-currency" maxlength="3" placeholder="USD" required>
            <small data-i18n="settings.currencyDesc"></small>
          </div>
          <div class="form-group">
            <label for="settings-max-depth" data-i18n="settings.maxAccountDepth"></label>
            <input type="number" id="settings-max-depth" min="1" value="5" required>
            <small data-i18n="settings.maxDepthDesc"></small>
          </div>
          <div class="btn-row" style="margin-top:1.5rem">
            <button type="submit" class="btn btn-primary btn-sm" data-i18n="common.save"></button>
          </div>
        </form>
        <div id="settings-loading" class="loading-state" style="display:none;text-align:center;padding:1rem">
          <small data-i18n="common.loading"></small>
        </div>
      </div>

      <!-- Currency Rates card -->
      <div class="card" style="margin-top:1.5rem">
        <div class="card-header">
          <span class="card-title">Currency Rates</span>
          <button class="btn btn-sm btn-primary" onclick="toggleAddRateForm()">+ Add rate</button>
        </div>

        <!-- Add rate form (hidden by default) -->
        <div id="add-rate-form" style="display:none;padding:1rem 0 0.5rem">
          <div class="form-grid">
            <div class="form-group">
              <label>From currency</label>
              <input type="text" id="rate-from" maxlength="3" placeholder="USD" style="text-transform:uppercase">
            </div>
            <div class="form-group">
              <label>To currency</label>
              <input type="text" id="rate-to" maxlength="3" placeholder="SGD" style="text-transform:uppercase">
            </div>
            <div class="form-group">
              <label>Effective date</label>
              <input type="date" id="rate-date">
            </div>
            <div class="form-group">
              <label>Rate</label>
              <input type="number" id="rate-value" min="0.000001" step="0.000001" placeholder="1.000000">
            </div>
          </div>
          <div class="btn-row" style="margin-top:0.5rem">
            <button class="btn btn-primary btn-sm" onclick="submitAddRate()">Save rate</button>
            <button class="btn btn-secondary btn-sm" onclick="toggleAddRateForm()">Cancel</button>
          </div>
        </div>

        <div id="rates-loading" style="display:none;text-align:center;padding:1rem"><small>Loading…</small></div>
        <div id="rates-container"></div>
      </div>

      <!-- Transaction Categories card -->
      <div class="card" style="margin-top:1.5rem">
        <div class="card-header">
          <span class="card-title">Transaction Categories</span>
          <button class="btn btn-sm btn-primary" id="add-category-btn" onclick="toggleAddCategoryForm()" style="display:none">+ Add category</button>
        </div>

        <!-- Add category form (hidden by default) -->
        <div id="add-category-form" style="display:none;padding:1rem 0 0.5rem">
          <div class="form-grid">
            <div class="form-group">
              <label>Type</label>
              <select id="cat-bucket">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
                <option value="deposit">Deposit</option>
                <option value="transfer">Transfer</option>
              </select>
            </div>
            <div class="form-group">
              <label>Category value</label>

<script>
// ============================================================
//  AUTH — JWT token initialization and check
// ============================================================

const AUTH_STORAGE_KEY = 'landlordguru_token';

// Decode JWT payload (without verification — done server-side)
function decodeToken(token) {
  try {
    const parts = token.split('.');
    if (parts.length !== 3) return null;
    const payload = JSON.parse(atob(parts[1]));
    return payload;
  } catch (e) {
    return null;
  }
}

// Check if token is expired
function isTokenExpired(token) {
  const payload = decodeToken(token);
  if (!payload || !payload.exp) return true;
  return Date.now() >= payload.exp * 1000;
}

// Get token from localStorage or query params
function getValidToken() {
  // Check query params for token from OAuth callback
  const params = new URLSearchParams(window.location.search);
  if (params.has('token')) {
    const token = params.get('token');
    if (!isTokenExpired(token)) {
      localStorage.setItem(AUTH_STORAGE_KEY, token);
      // Clean up URL
      window.history.replaceState({}, document.title, window.location.pathname);
      return token;
    }
  }

  // Check localStorage
  const stored = localStorage.getItem(AUTH_STORAGE_KEY);
  if (stored && !isTokenExpired(stored)) {
    return stored;
  }

  return null;
}

// Check auth error from query params
function checkAuthError() {
  const params = new URLSearchParams(window.location.search);
  const error = params.get('auth_error');
  if (error) {
    const errorMessages = {
      'oauth_failed': 'Google sign-in failed. Please try again.',
      'no_workspace_assigned': 'Your account has not been assigned to a workspace. Please contact your administrator.',
      'no_workspace_access': 'You do not have access to any workspace. Please contact your administrator.',
      'server_error': 'An error occurred during sign-in. Please try again.',
    };
    alert(errorMessages[error] || 'An authentication error occurred.');
    window.history.replaceState({}, document.title, window.location.pathname);
  }
}

// Initialize auth state
function initAuth() {
  checkAuthError();
  const token = getValidToken();

  if (token) {
    // Authenticated — show app, hide login
    document.getElementById('app').style.display = '';
    document.getElementById('login-screen').style.display = 'none';
    window.AUTH_TOKEN = token;
    initUserAvatar();
  } else {
    // Not authenticated — hide app, show login
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    window.AUTH_TOKEN = null;
  }
}

// Logout function
async function logout() {
  try {
    const response = await fetch('/auth/logout');
    if (response.ok) {
      localStorage.removeItem(AUTH_STORAGE_KEY);
      window.AUTH_TOKEN = null;
      window.location.reload();
    }
  } catch (e) {
    console.error('Logout failed:', e);
  }
}

// User menu functions
function initUserAvatar() {
  const token = window.AUTH_TOKEN;
  if (!token) return;

  const payload = decodeToken(token);
  if (!payload || !payload.name) return;

  // Extract initials from name (first letter of given name + first letter of family name)
  const parts = payload.name.trim().split(/\s+/);
  let initials = '';
  if (parts.length >= 2) {
    initials = (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  } else if (parts.length === 1) {
    initials = parts[0].substring(0, 2).toUpperCase();
  }

  const avatarBtn = document.getElementById('user-avatar');
  if (avatarBtn) {
    avatarBtn.textContent = initials || '?';
  }
}

function toggleUserMenu() {
  const menu = document.getElementById('user-menu');
  if (menu) {
    menu.classList.toggle('open');
  }
}

function closeUserMenu() {
  const menu = document.getElementById('user-menu');
  if (menu) {
    menu.classList.remove('open');
  }
}

// Close user menu when clicking outside
document.addEventListener('click', function(event) {
  const avatar = document.getElementById('user-avatar');
  const menu = document.getElementById('user-menu');
  if (avatar && menu && !avatar.contains(event.target) && !menu.contains(event.target)) {
    menu.classList.remove('open');
  }
});

// Run on page load
initAuth();
</script>

<script>
// ============================================================
//  APP — main UI controller
// ============================================================

// ── Global state ──────────────────────────────────────────

let State = {
  properties:   [],
  transactions: [],
  rules:        [],
  editingTxId:  null,
  editingAptId: null,
  importRows:   [],
};

// ── Boot ──────────────────────────────────────────────────

async function boot() {
  setLoading(true, t('status.connecting'));
  try {
    // v2 mode: authenticated via JWT — use backend API
    await refreshAll();
  } catch(e) {
    setStatus(t('status.error', { message: e.message }));
    toast(t('status.connFailed', { error: e.message }), 'error');
    console.error(e);
  }
  setLoading(false);
}

async function refreshAll() {
  setLoading(true, t('status.loadingData'));
  try {
    // v2 mode: data from backend API
    const [props, txs, rules, wsSettings, rates] = await Promise.all([
      Api.getProperties(),
      Api.getTransactions(),
      Api.getRules(),
      Api.getWorkspaceSettings(),
      Api.getCurrencyRates(),
    ]);
    State.properties        = props;
    State.transactions      = (txs.data ?? txs).map(tx => ({ ...tx, amount: parseFloat(tx.amount) }));
    State.rules             = rules;
    State.workspaceSettings = wsSettings;
    State.currencyRates     = rates;
    populateAllDropdowns();
    renderCurrentPage();
    setStatus(t('status.synced', { time: new Date().toLocaleTimeString() }));
  } catch(e) {
    setStatus(t('status.syncError'));
    toast(t('status.connFailed', { error: e.message }), 'error');
    console.error(e);
  }
  setLoading(false);
}

// ── Page routing ──────────────────────────────────────────

let currentPage = 'dashboard';

function showPage(id, btn) {
  currentPage = id;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
  renderCurrentPage();
}

function renderCurrentPage() {
  if (currentPage === 'dashboard')    renderDashboard();
  if (currentPage === 'transactions') renderTxTable();
  if (currentPage === 'reports')      renderReports();
  if (currentPage === 'properties')   renderPropertyList();
  if (currentPage === 'rules')        renderRules();
  if (currentPage === 'settings')     renderSettings();
}

// ── Populate dropdowns ────────────────────────────────────

function populateAllDropdowns() {
  const propOpts = State.properties.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

  const repYear = document.getElementById('rep-year');
  if (repYear) {
    const years = [...new Set(State.transactions.map(tx => tx.date?.slice(0,4)).filter(Boolean))].sort().reverse();
    const cur = repYear.value;
    repYear.innerHTML = '<option value="">— Year —</option>' + years.map(y => `<option value="${y}">${y}</option>`).join('');
    if (cur && years.includes(cur)) repYear.value = cur;
  }

  ['tx-filter-apt','rep-apt'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { const v = el.value; el.innerHTML = `<option value="all">${t('tx.filter.allProperties')}</option>${propOpts}`; el.value = v || 'all'; }
  });

  ['tx-m-apt','import-apt','rule-m-apt'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    let blank;
    if (id === 'rule-m-apt')  blank = `<option value="">${t('rules.modal.anyProperty')}</option>`;
    else if (id === 'import-apt') blank = `<option value="">${t('import.autoDetect')}</option>`;
    else                      blank = `<option value="">${t('common.select')}</option>`;
    el.innerHTML = blank + propOpts;
  });

  const catOpts = Importer.buildCategoryOptions('');
  ['tx-m-cat','rule-m-cat','tx-filter-cat'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const blank = id === 'tx-filter-cat'
      ? `<option value="all">${t('tx.filter.allCats')}</option>`
      : `<option value="">${t('common.select')}</option>`;
    el.innerHTML = blank + catOpts;
  });
}

// ── Dashboard ─────────────────────────────────────────────

function renderDashboard() {
  const txs  = State.transactions;
  const props = State.properties;
  const yr   = new Date().getFullYear();
  const ytd  = txs
    .filter(tx => tx.date.startsWith(yr) && tx.type === 'income')
    .reduce((s, tx) => s + tx.amount * (CONFIG.FX_RATES[tx.currency] || 1), 0);

  document.getElementById('dash-metrics').innerHTML = `
    <div class="metric">
      <div class="m-label">${t('dashboard.metrics.activeProperties')}</div>
      <div class="m-value">${props.filter(p => p.active).length}</div>
      <div class="m-sub">${props.filter(p => p.country==='DK').length} DK · ${props.filter(p => p.country==='PL').length} PL</div>
    </div>
    <div class="metric">
      <div class="m-label">${t('dashboard.metrics.ytdIncome')}</div>
      <div class="m-value">${Reports.fmtDKK(ytd)}</div>
      <div class="m-sub">${t('dashboard.metrics.ytdSub', { month: new Date().toLocaleString('en',{month:'short'}), year: yr })}</div>
    </div>
    <div class="metric">
      <div class="m-label">${t('dashboard.metrics.totalTx')}</div>
      <div class="m-value">${txs.length}</div>
      <div class="m-sub">${t('dashboard.metrics.txSub', { manual: txs.filter(tx=>tx.source==='manual').length, imported: txs.filter(tx=>tx.source!=='manual').length })}</div>
    </div>
    <div class="metric">
      <div class="m-label">${t('dashboard.metrics.unreconciled')}</div>
      <div class="m-value">${txs.filter(tx=>!tx.reconciled).length}</div>
      <div class="m-sub">${t('dashboard.metrics.unreconciledSub')}</div>

  document.getElementById('dash-apt-cards').innerHTML = props.length === 0

        <h3 style="margin:0 0 0.5rem 0">${t('property.noProperties')}</h3>
        <p style="margin:0 0 1.5rem 0;color:#666">${t('property.noPropertiesSub')}</p>
        <button class="btn btn-primary" onclick="openPropertyModal()">${t('property.addBtn')}</button>
      </div>`
    : props.map(p => {
        const ptxs    = txs.filter(tx => tx.property_id === p.id);
        const income  = ptxs.filter(tx => tx.type === 'income').reduce((s, tx) => s + tx.amount, 0);
        const rent    = parseFloat(p.rent) || 0;
        const aconto  = parseFloat(p.aconto) || 0;

        const addr    = p.address || '<span style="color:#999;font-style:italic">no address registered</span>';
        return `<div class="apt-card">
          <span class="badge badge-${p.country.toLowerCase()}">${t('country.' + p.country)} · ${p.currency}</span>
          <span class="badge badge-model" style="margin-left:6px">${t('property.model.' + (p.model || 'longterm'))}</span>
          <div class="apt-name">${p.name}</div>
          <div class="apt-addr">${addr}</div>
          <div class="apt-stats">
            <div class="stat"><strong>${monthly > 0 ? Reports.fmt(monthly, p.currency) : '—'}</strong>${t('common.monthly')}</div>
            <div class="stat"><strong>${income  ? Reports.fmt(income,  p.currency) : '—'}</strong>${t('common.totalIncome')}</div>
            <div class="stat"><strong>${p.tenant || '—'}</strong>${t('property.metric.tenant')}</div>
          </div>
        </div>`;
      }).join('');

  const recent = [...txs].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 8);
  document.getElementById('dash-recent-tx').innerHTML = recent.length
    ? recent.map(tx => txRow(tx, false)).join('')
    : `<tr><td colspan="5" class="empty-state">${t('dashboard.noTx')}</td></tr>`;
}

// ── Transactions table ────────────────────────────────────

const TxSort = { col: 'date', dir: 'desc' };
const TxListState = { page: 1, limit: 50, total: 0, data: [] };

// Keep --nav-h in sync with actual nav height so #tx-sticky-header stacks correctly.
// Uses ResizeObserver so it adapts to zoom, font-size changes, and window resizes.
function updateTxStickyOffsets() {
  const nav = document.querySelector('header');
  if (!nav) return;
  document.documentElement.style.setProperty('--nav-h', nav.getBoundingClientRect().height + 'px');
}

const _txStickyObserver = new ResizeObserver(updateTxStickyOffsets);
document.addEventListener('DOMContentLoaded', () => {
  const nav = document.querySelector('header');
  if (nav) _txStickyObserver.observe(nav);
  updateTxStickyOffsets();
});

function setTxSort(col) {
  if (TxSort.col === col) {
    TxSort.dir = TxSort.dir === 'desc' ? 'asc' : 'desc';
  } else {
    TxSort.col = col;
    TxSort.dir = col === 'amount' ? 'desc' : 'desc';
  }
  renderTxTable();
}

function resetAndRenderTxTable() {
  TxListState.page = 1;
  renderTxTable();
}

function onTxRowsPerPageChange() {
  const val = document.getElementById('tx-rows-per-page')?.value;
  TxListState.limit = parseInt(val || '50', 10);
  TxListState.page  = 1;
  renderTxTable();
}

function goToTxPage(n) {
  const totalPages = Math.max(1, Math.ceil(TxListState.total / TxListState.limit));
  TxListState.page = Math.max(1, Math.min(n, totalPages));
  renderTxTable();
}

function buildPageRange(current, total) {
  if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
  const pages = [];
  pages.push(1);
  if (current > 3) pages.push('…');
  for (let p = Math.max(2, current - 1); p <= Math.min(total - 1, current + 1); p++) {
    pages.push(p);
  }
  if (current < total - 2) pages.push('…');
  pages.push(total);
  return pages;
}

function renderTxPagination() {
  const container = document.getElementById('tx-pagination');
  if (!container) return;
  const { page, limit, total } = TxListState;
  const totalPages = Math.max(1, Math.ceil(total / limit));

  const rppOptions = [10, 20, 50, 100].map(n =>
    `<option value="${n}"${n === limit ? ' selected' : ''}>${n} / page</option>`
  ).join('');
  const rppSelect = `<select id="tx-rows-per-page" onchange="onTxRowsPerPageChange()">${rppOptions}</select>`;

  if (totalPages <= 1) {
    container.innerHTML = rppSelect;
    return;
  }

  const pages = buildPageRange(page, totalPages);
  const btns = pages.map(p => {
    if (p === '…') return `<span style="padding:2px 4px">…</span>`;
    const activeStyle = p === page ? 'font-weight:600;color:var(--text);' : '';
    return `<button style="${activeStyle}" onclick="goToTxPage(${p})">${p}</button>`;
  });

  container.innerHTML = [
    rppSelect,
    `<button ${page <= 1 ? 'disabled' : ''} onclick="goToTxPage(${page - 1})">&#8249;</button>`,
    ...btns,
    `<button ${page >= totalPages ? 'disabled' : ''} onclick="goToTxPage(${page + 1})">&#8250;</button>`,
  ].join('');
}

async function renderTxTable() {
  const filterApt    = document.getElementById('tx-filter-apt')?.value;
  const filterType   = document.getElementById('tx-filter-type')?.value;
  const filterCat    = document.getElementById('tx-filter-cat')?.value;
  const filterFrom   = document.getElementById('tx-filter-from')?.value;
  const filterTo     = document.getElementById('tx-filter-to')?.value;
  const filterSearch = document.getElementById('tx-filter-search')?.value;

  const filters = { page: TxListState.page, limit: TxListState.limit };
  if (filterApt    && filterApt    !== 'all') filters.property_id = filterApt;
  if (filterType   && filterType   !== 'all') filters.type        = filterType;
  if (filterCat    && filterCat    !== 'all') filters.category    = filterCat;
  if (filterFrom)  filters.from   = filterFrom;
  if (filterTo)    filters.to     = filterTo;
  if (filterSearch) filters.search = filterSearch;

  let result;
  try {
    result = await Api.getTransactions(filters);
  } catch (e) {
    console.error('renderTxTable fetch error:', e);
    return;
  }

  const pageData = (result.data ?? []).map(tx => ({ ...tx, amount: parseFloat(tx.amount) }));
  TxListState.total = result.total ?? 0;
  TxListState.data  = pageData;

  const sorted = [...pageData].sort((a, b) => {
    let cmp = 0;
    if (TxSort.col === 'amount') cmp = a.amount - b.amount;
    else cmp = a.date.localeCompare(b.date);
    return TxSort.dir === 'asc' ? cmp : -cmp;
  });

  // Update sortable header indicators
  document.querySelectorAll('#page-transactions th.sortable').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
  });
  const hdrs = document.querySelectorAll('#page-transactions th.sortable');
  const sortColIndex = TxSort.col === 'amount' ? 1 : 0;
  if (hdrs[sortColIndex]) hdrs[sortColIndex].classList.add('sort-' + TxSort.dir);

  const body   = document.getElementById('tx-table-body');
  const empty  = document.getElementById('tx-empty');
  const footer = document.getElementById('tx-footer');

  if (!sorted.length) {
    body.innerHTML = '';
    empty.style.display = 'block';
    footer.textContent  = '';
    renderTxPagination();
    onTxRowSelect();
    return;
  }

  // Show converted-amount toggle if workspace has multiple currencies in view
  const reportingCurrency = State.workspaceSettings?.reporting_currency;
  const hasMultiCurrency = reportingCurrency && sorted.some(tx => tx.currency !== reportingCurrency);
  const toggleWrap = document.getElementById('tx-converted-toggle-wrap');
  if (toggleWrap) {
    toggleWrap.style.display = hasMultiCurrency ? 'flex' : 'none';
    const lbl = document.getElementById('tx-converted-label');
    if (lbl) lbl.textContent = t('tx.showConverted', { currency: reportingCurrency });
  }

  const showConverted = hasMultiCurrency && document.getElementById('tx-show-converted')?.checked;

  empty.style.display = 'none';
  body.innerHTML = sorted.map(tx => txRow(tx, true, showConverted, reportingCurrency)).join('');

  const totalIncome  = sorted.filter(tx => tx.type==='income').reduce((s,tx) => s+tx.amount, 0);
  const totalExpense = sorted.filter(tx => tx.type==='expense').reduce((s,tx) => s+tx.amount, 0);
  const from = (TxListState.page - 1) * TxListState.limit + 1;
  const to   = from + sorted.length - 1;
  const footerKey = TxListState.total > sorted.length ? 'tx.footerPaged' : 'tx.footer';
  footer.textContent = t(footerKey, {
    count:    sorted.length,
    from,
    to,
    total:    TxListState.total,
    income:   totalIncome.toLocaleString(),
    expenses: totalExpense.toLocaleString(),
  });

  renderTxPagination();
  onTxRowSelect();
}

function txRow(tx, showEditBtn, showConverted, reportingCurrency) {
  const prop   = State.properties.find(p => p.id === tx.property_id);
  const catLbl = Reports.categoryLabel(tx.category);
  const srcLbl = tx.source === 'manual' ? t('common.manual') : (BANK_PROFILES[tx.source]?.label || tx.source);
  const amtCls = tx.type === 'income' ? 'positive' : tx.type === 'expense' ? 'negative' : '';
  const currency = tx.currency || prop?.currency || '';

  // Resolve converted amount from cached rates if toggle is on
  let convertedHtml = '';
  if (showConverted && reportingCurrency && currency !== reportingCurrency) {
    const rates = State.currencyRates || [];
    const rate = rates
      .filter(r => r.from_currency === currency && r.to_currency === reportingCurrency && r.effective_date <= tx.date)
      .sort((a, b) => b.effective_date.localeCompare(a.effective_date))[0];
    if (rate) {
      const converted = (tx.amount * parseFloat(rate.rate)).toFixed(2);
      convertedHtml = `<div style="font-size:11px;color:var(--text3)">${Reports.fmt(converted, reportingCurrency)}</div>`;
    }
  }

  const deleteBtn = showEditBtn && window.AUTH_TOKEN
    ? `<button class="btn btn-sm btn-secondary" style="margin-left:6px" onclick="event.stopPropagation();deleteTxWithConfirm('${tx.id}')">${t('common.delete')}</button>`
    : '';
  const actions = showEditBtn ? `<td>${deleteBtn}</td>` : '';
  return `<tr class="clickable-row" onclick="openTxModal('${tx.id}')">
    <td onclick="event.stopPropagation()"><input type="checkbox" class="tx-row-cb" data-id="${tx.id}" onchange="onTxRowSelect()"></td>
    <td>${tx.date}</td>
    <td>${prop ? prop.name : '<span class="muted">—</span>'}</td>
    <td><span class="tag tag-${tx.type}">${t('categories.' + tx.type)}</span></td>
    <td><span class="tag tag-${tx.type}">${catLbl}</span></td>
    <td>${tx.description}${tx.notes ? `<div style="font-size:11px;color:var(--text3)">${tx.notes}</div>` : ''}</td>
    ${showEditBtn ? `<td><span class="muted" style="font-size:11px">${srcLbl}</span></td>` : ''}
    <td class="amount-cell ${amtCls}">${Reports.fmt(tx.amount, currency)}<span class="muted" style="font-size:11px;margin-left:4px">${currency}</span>${convertedHtml}</td>
    ${actions}
  </tr>`;
}

function txSelectAll(checked) {
  document.querySelectorAll('.tx-row-cb').forEach(cb => { cb.checked = checked; });
  onTxRowSelect();
}

function onTxRowSelect() {
  const cbs = document.querySelectorAll('.tx-row-cb');
  const selected = [...cbs].filter(cb => cb.checked);
  const bar = document.getElementById('tx-bulk-bar');
  const allCb = document.getElementById('tx-select-all');
  if (selected.length > 0) {
    bar.style.display = 'flex';
    document.getElementById('tx-bulk-count').textContent = t('tx.selected', { count: selected.length });
  } else {
    bar.style.display = 'none';
  }

}

async function bulkDeleteTx() {
  const ids = [...document.querySelectorAll('.tx-row-cb:checked')].map(cb => cb.dataset.id);
  if (!ids.length) { toast(t('tx.toast.noneSelected'), 'error'); return; }
  if (!confirm(t('tx.confirmBulkDelete', { count: ids.length }))) return;
  setLoading(true, t('status.deleting'));
  try {
    await Promise.all(ids.map(id => Api.deleteTransaction(id)));
    await refreshAll();
    toast(t('tx.toast.bulkDeleted', { count: ids.length }), 'success');
  } catch(e) {
    toast(t('tx.toast.delFailed', { error: e.message }), 'error');
  }
  setLoading(false);
}

function updateCategoryFilter() {

  const catEl = document.getElementById('tx-filter-cat');

    });
  } else {
    catEl.innerHTML += Importer.buildCategoryOptions('');
  }
}

function clearTxFilters() {
  ['tx-filter-apt','tx-filter-type','tx-filter-cat'].forEach(id => document.getElementById(id).value = 'all');
  ['tx-filter-from','tx-filter-to','tx-filter-search'].forEach(id => document.getElementById(id).value = '');

  resetAndRenderTxTable();
}

function openTxModal(txId) {
  State.editingTxId = txId || null;
  const modal  = document.getElementById('modal-tx');
  const delBtn = document.getElementById('tx-m-delete-btn');
  populateAllDropdowns();

  if (txId) {
    const tx = TxListState.data.find(tx => tx.id === txId) || State.transactions.find(tx => tx.id === txId);
    if (!tx) return;
    document.getElementById('tx-modal-title').textContent = t('tx.modal.editTitle');
    document.getElementById('tx-m-date').value   = tx.date;
    document.getElementById('tx-m-apt').value    = tx.property_id;
    document.getElementById('tx-m-cat').value    = tx.category;
    document.getElementById('tx-m-amount').value = tx.amount;
    document.getElementById('tx-m-desc').value   = tx.description;
    document.getElementById('tx-m-notes').value  = tx.notes;
    delBtn.style.display = 'inline-block';
  } else {
    document.getElementById('tx-modal-title').textContent = t('tx.modal.addTitle');
    document.getElementById('tx-m-date').value   = new Date().toISOString().slice(0,10);
    document.getElementById('tx-m-cat').value    = '';
    document.getElementById('tx-m-amount').value = '';
    document.getElementById('tx-m-desc').value   = '';
    document.getElementById('tx-m-notes').value  = '';
    delBtn.style.display = 'none';
  }
  onCategoryChange();
  modal.style.display = 'flex';
}

function closeTxModal() { document.getElementById('modal-tx').style.display = 'none'; }

function onCategoryChange() {
  const cat  = document.getElementById('tx-m-cat').value;
  const hint = document.getElementById('tx-m-notes-hint');
  const lbl  = document.getElementById('tx-m-notes-label');
  const requiresNote = cat && CATEGORIES.expense?.items[cat]?.requiresNote;
  hint.style.display = requiresNote ? 'block' : 'none';
  lbl.textContent    = requiresNote ? t('tx.modal.notesReq') : t('tx.modal.notes');
}

async function saveTxModal() {
  const date   = document.getElementById('tx-m-date').value;
  const propId = document.getElementById('tx-m-apt').value;
  const cat    = document.getElementById('tx-m-cat').value;
  const amount = parseFloat(document.getElementById('tx-m-amount').value);
  const desc   = document.getElementById('tx-m-desc').value.trim();
  const notes  = document.getElementById('tx-m-notes').value.trim();

  if (!date || !propId || !cat || !amount) { toast(t('tx.toast.fillReq'), 'error'); return; }
  if (CATEGORIES.expense?.items[cat]?.requiresNote && !notes) { toast(t('tx.toast.noteReq'), 'error'); return; }

  const prop = State.properties.find(p => p.id === propId);
  const type = Importer.categoryToType(cat);

  setLoading(true, t('status.saving'));
  try {
    const data = {
      date,
      type,
      category: cat,
      amount,
      currency: prop?.currency || 'DKK',
      description: desc,
      notes: notes || null,
      source: 'manual',
      reconciled: false,
    };

    // v2 mode: use backend API (account_id is optional, defaults to workspace default)
    if (State.editingTxId) {
      await Api.updateTransaction(State.editingTxId, data);
      toast(t('tx.toast.updated'), 'success');
    } else {
      await Api.createTransaction(data);
      toast(t('tx.toast.saved'), 'success');
    }
    await refreshAll();
    closeTxModal();
  } catch(e) {
    toast(t('tx.toast.saveFailed', { error: e.message }), 'error');
  }
  setLoading(false);
}

async function deleteTxModal() {
  if (!confirm(t('tx.confirmDelete'))) return;
  setLoading(true, t('status.deleting'));
  try {
    // v2 mode: hard delete via API
    await Api.deleteTransaction(State.editingTxId);
    await refreshAll();
    closeTxModal();
    toast(t('tx.toast.deleted'), 'success');
  } catch(e) {
    toast(t('tx.toast.delFailed', { error: e.message }), 'error');
  }
  setLoading(false);
}

async function deleteTxWithConfirm(txId) {
  if (!confirm(t('tx.confirmDelete'))) return;
  setLoading(true, t('status.deleting'));
  try {
    await Api.deleteTransaction(txId);
    await refreshAll();
    toast(t('tx.toast.deleted'), 'success');
  } catch(e) {
    toast(t('tx.toast.delFailed', { error: e.message }), 'error');
  }
  setLoading(false);
}

// ── Description mappings (localStorage) ──────────────────
// Structure: [{ bank_profile, user_id, keyword, category, updated_at }]
// Composite unique key: (bank_profile, user_id, keyword)

const DESC_MAPPINGS_KEY = 'lg_desc_mappings_v1';

function getDescMappings() {
  try { return JSON.parse(localStorage.getItem(DESC_MAPPINGS_KEY) || '[]'); }
  catch(e) { return []; }
}

function applyDescMappings(rows, profileKey, userId = '') {
  const mappings = getDescMappings();
  if (!mappings.length) return;
  rows.forEach(row => {
    const desc = (row.raw_description || row.description || '').toLowerCase();
    // User-specific first, then global (empty user_id)
    const match =
      mappings.find(m => m.user_id === userId && (m.bank_profile === profileKey || m.bank_profile === '') && desc.includes(m.keyword.toLowerCase())) ||
      (userId !== '' ? mappings.find(m => m.user_id === '' && (m.bank_profile === profileKey || m.bank_profile === '') && desc.includes(m.keyword.toLowerCase())) : null);
    if (match) {
      row.category          = match.category;
      row.type              = Importer.categoryToType(match.category);
      row._descMappingMatched = true;
      row._autoMatched      = false;
    }
  });
}

function saveDescMappingsForRows(rows, profileKey, userId = '') {
  const mappings = getDescMappings();
  rows.forEach(row => {
    if (!row._storeMapping || row._ignored) return;
    const keyword = (row.raw_description || row.description || '').trim();
    if (!keyword) return;
    const idx = mappings.findIndex(m => m.bank_profile === profileKey && m.user_id === userId && m.keyword === keyword);
    const entry = { bank_profile: profileKey, user_id: userId, keyword, category: row.category, updated_at: new Date().toISOString() };
    if (idx >= 0) mappings[idx] = entry;
    else mappings.push(entry);
  });
  localStorage.setItem(DESC_MAPPINGS_KEY, JSON.stringify(mappings));
}

// ── Row selection ─────────────────────────────────────────

function toggleSelectAll(headerCb) {
  const checked = headerCb.checked;
  State.importRows.forEach((row, i) => {
    row._selected = checked;
    const cb = document.getElementById('row-sel-' + i);
    if (cb) cb.checked = checked;
  });
}

function onRowSelect(i) {
  const checked = document.getElementById('row-sel-' + i).checked;
  State.importRows[i]._selected = checked;

  // If "select same description" is on and the row is being checked, auto-select all rows
  // with exactly the same description, then reset the toggle ready for next use
  const sameDescToggle = document.getElementById('select-same-desc-toggle');
  if (checked && sameDescToggle?.checked) {
    const desc = State.importRows[i].description;
    State.importRows.forEach((row, j) => {
      if (j !== i && row.description === desc) {
        row._selected = true;
        const cb = document.getElementById('row-sel-' + j);
        if (cb) cb.checked = true;
      }
    });
    sameDescToggle.checked = false;
  }

  const all = State.importRows.length > 0 && State.importRows.every(r => r._selected);
  const hdr = document.getElementById('select-all-cb');
  if (hdr) hdr.checked = all;
}

// ── Bulk field change ─────────────────────────────────────

function onRowFieldChange(i, field, value) {
  State.importRows[i][field] = value;
  if (field === 'category') State.importRows[i].type = Importer.categoryToType(value);
  _applyRowStyle(i);

  const bulkOn = document.getElementById('bulk-update-toggle')?.checked;
  if (bulkOn && State.importRows[i]._selected) {
    State.importRows.forEach((row, j) => {
      if (j === i || !row._selected) return;
      row[field] = value;
      if (field === 'category') row.type = Importer.categoryToType(value);
      _syncRowDOM(j, field, value);
      _applyRowStyle(j);
    });
  }
}

function _syncRowDOM(j, field, value) {
  const map = { property_id: 'row-prop-', category: 'row-cat-', notes: 'row-notes-', _ignored: 'row-ign-', _storeMapping: 'row-map-' };
  const prefix = map[field];
  if (!prefix) return;
  const el = document.getElementById(prefix + j);
  if (!el) return;
  if (el.type === 'checkbox') el.checked = value;
  else el.value = value;
}

function _applyRowStyle(i) {
  const tr = document.querySelector('tr[data-row="' + i + '"]');
  if (!tr) return;
  if (State.importRows[i]._ignored) tr.classList.add('preview-row-ignored');
  else                               tr.classList.remove('preview-row-ignored');
}

// ── Column mapping ────────────────────────────────────────

const MAPPING_STORAGE_KEY = 'lg_col_mappings_v1';

function getSavedMappings() {
  try { return JSON.parse(localStorage.getItem(MAPPING_STORAGE_KEY) || '{}'); }
  catch(e) { return {}; }
}

function refreshSavedMappingsDropdown() {
  const sel     = document.getElementById('mapping-saved-select');
  const current = sel.value;
  const names   = Object.keys(getSavedMappings());
  sel.innerHTML = `<option value="">${t('import.mapping.noSaved')}</option>`
    + names.map(n => `<option value="${n}"${n === current ? ' selected' : ''}>${n}</option>`).join('');
}

function _setSelectValue(el, val) {
  for (const opt of el.options) {
    if (opt.value === val) { opt.selected = true; return; }
  }
}

function showMappingPanel(csvText, profileKey) {
  const lines = csvText.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 1) return;

  const profile   = BANK_PROFILES[profileKey] || {};
  const skipRows  = profile.skip_rows ?? 1;
  const delimiter = Importer.detectDelimiter(lines[0]);
  const headers   = Importer.splitCSVLine(lines[0], delimiter);
  const sampleIdx = Math.min(skipRows, lines.length - 1);
  const sample    = Importer.splitCSVLine(lines[sampleIdx] || '', delimiter);
  const detected  = Importer.detectColumns(headers, profile);

  // Seed format selects from profile
  if (profile.date_format)    _setSelectValue(document.getElementById('mapping-date-format'), profile.date_format);
  if (profile.amount_decimal) _setSelectValue(document.getElementById('mapping-decimal'),     profile.amount_decimal);
  if (profile.currency)       _setSelectValue(document.getElementById('mapping-currency-sel'), profile.currency);
  document.getElementById('mapping-skip-rows').value = skipRows;

  // Render one row per CSV column
  const roles = ['date', 'description', 'amount', 'ignore'];
  document.getElementById('mapping-table-body').innerHTML = headers.map((h, i) => {
    let autoRole = 'ignore';
    if      (detected.date_col        === i) autoRole = 'date';
    else if (detected.description_col === i) autoRole = 'description';
    else if (detected.amount_col      === i) autoRole = 'amount';

    const roleOpts  = roles.map(r =>
      `<option value="${r}"${r === autoRole ? ' selected' : ''}>${t('import.mapping.roles.' + r)}</option>`
    ).join('');
    const sampleVal = (sample[i] || '').replace(/^"|"$/g, '').slice(0, 40);

    return `<tr>
      <td style="font-size:12px;font-weight:500;padding:4px 8px">${h.replace(/^"|"$/g, '')}</td>
      <td style="font-size:11px;color:var(--text3);padding:4px 8px">${sampleVal}</td>
      <td style="padding:4px 8px">
        <select class="mapping-role-sel" data-col="${i}" style="font-size:12px;padding:3px 6px">
          ${roleOpts}
        </select>
      </td>
    </tr>`;
  }).join('');

  refreshSavedMappingsDropdown();
  document.getElementById('import-mapping-section').style.display = 'block';
}

function buildColumnMap() {
  const csvText   = _importCSVText || document.getElementById('import-csv').value;
  const firstLine = csvText.split(/\r?\n/).find(l => l.trim()) || '';
  const map = {
    date_col:        -1,
    description_col: -1,
    amount_col:      -1,
    delimiter:       Importer.detectDelimiter(firstLine),
    date_format:     document.getElementById('mapping-date-format').value,
    amount_decimal:  document.getElementById('mapping-decimal').value,
    currency:        document.getElementById('mapping-currency-sel').value,
    skip_rows:       parseInt(document.getElementById('mapping-skip-rows').value, 10) || 1,
  };
  document.querySelectorAll('.mapping-role-sel').forEach(sel => {
    const col  = parseInt(sel.dataset.col, 10);
    const role = sel.value;
    if      (role === 'date')        map.date_col        = col;
    else if (role === 'description') map.description_col = col;
    else if (role === 'amount')      map.amount_col      = col;
  });
  return map;
}

function applyMappingToUI(saved) {
  _setSelectValue(document.getElementById('mapping-date-format'),  saved.date_format    || 'YYYY-MM-DD');
  _setSelectValue(document.getElementById('mapping-decimal'),      saved.amount_decimal || '.');
  _setSelectValue(document.getElementById('mapping-currency-sel'), saved.currency       || 'DKK');
  if (saved.skip_rows !== undefined)
    document.getElementById('mapping-skip-rows').value = saved.skip_rows;

  document.querySelectorAll('.mapping-role-sel').forEach(sel => {
    const col = parseInt(sel.dataset.col, 10);
    let role = 'ignore';
    if      (saved.date_col        === col) role = 'date';
    else if (saved.description_col === col) role = 'description';
    else if (saved.amount_col      === col) role = 'amount';
    _setSelectValue(sel, role);
  });
}

function saveCurrentMapping() {

function runImportPreview() {
  const pasteText  = document.getElementById('import-csv').value.trim();
  const csv        = _importCSVText || pasteText;
  const profileKey = document.getElementById('import-profile').value;
  const propId     = document.getElementById('import-apt').value;

  if (!csv) { toast(t('import.toast.noData'), 'error'); return; }

  // Show/refresh mapping panel if not visible
  if (document.getElementById('import-mapping-section').style.display === 'none') {
    showMappingPanel(csv, profileKey);
  }

  const colMap = buildColumnMap();

  let result;
  try {
    result = Importer.parseCSV(csv, profileKey, propId, State.rules, colMap);
  } catch(e) {
    toast(t('import.toast.parseError', { error: e.message }), 'error');
    return;
  }

  // Apply description mappings (highest priority — overrides rule matches)
  applyDescMappings(result.rows, profileKey);

  // Initialise per-row UI flags
  State.importRows = result.rows.map(r => Object.assign(r, { _selected: false, _ignored: false, _storeMapping: false }));

  document.getElementById('import-preview-title').textContent =
    `Preview — ${result.rows.length} rows from ${result.profileLabel}`;

  document.getElementById('import-preview-body').innerHTML = State.importRows.map((row, i) => {
    const propOpts = State.properties.map(p =>
      `<option value="${p.id}"${p.id === row.property_id ? ' selected' : ''}>${p.name}</option>`
    ).join('');
    const catOpts = Importer.buildCategoryOptions(row.category);
    let matchTag = '';
    if      (row._descMappingMatched) matchTag = '<span class="tag tag-mapping">mapped</span> ';
    else if (row._autoMatched)        matchTag = '<span class="tag tag-auto">auto</span> ';
    const warnClass = (!row._autoMatched && !row._descMappingMatched) ? 'preview-row-warn' : '';
    const amtSign   = row.type === 'expense' ? '-' : '';
    const amtCls    = row.type === 'expense' ? 'negative' : 'positive';
    return `<tr data-row="${i}" class="${warnClass}">
      <td style="text-align:center"><input type="checkbox" id="row-sel-${i}" onchange="onRowSelect(${i})"></td>
      <td>${row.date}</td>
      <td style="max-width:160px;font-size:12px">${row.description}</td>
      <td><select id="row-prop-${i}" style="font-size:12px;padding:4px 6px" onchange="onRowFieldChange(${i},'property_id',this.value)"><option value="">—</option>${propOpts}</select></td>
      <td>${matchTag}<select id="row-cat-${i}" style="font-size:12px;padding:4px 6px" onchange="onRowFieldChange(${i},'category',this.value)">${catOpts}</select></td>
      <td><input id="row-notes-${i}" style="font-size:12px;padding:4px 6px;width:120px" placeholder="notes…" value="${row.notes || ''}" oninput="onRowFieldChange(${i},'notes',this.value)"></td>
      <td class="amount-cell ${amtCls}">${amtSign}${row.amount.toLocaleString()} ${result.currency || ''}</td>
      <td style="text-align:center"><input type="checkbox" id="row-ign-${i}" onchange="onRowFieldChange(${i},'_ignored',this.checked)"></td>
      <td style="text-align:center"><input type="checkbox" id="row-map-${i}" onchange="onRowFieldChange(${i},'_storeMapping',this.checked)"></td>
    </tr>`;
  }).join('');

  const errDiv = document.getElementById('import-errors');
  if (result.errors.length) {
    errDiv.innerHTML = `<p style="font-size:12px;color:var(--amber)">⚠ ${result.errors.length} rows skipped:</p>`
      + result.errors.map(e => `<div style="font-size:11px;color:var(--text3)">Line ${e.line}: ${e.reason}</div>`).join('');
  } else {
    errDiv.innerHTML = '';
  }

  document.getElementById('select-all-cb').checked = false;
  document.getElementById('import-static-section').style.display = 'none';
  document.getElementById('import-mapping-confirm-section').style.display = 'none';
  const preview = document.getElementById('import-preview-section');
  preview.style.display = 'block';
  preview.scrollIntoView({ behavior: 'smooth' });

}

function goToStaticPreview() {
  const activeRows = State.importRows.filter(r => !r._ignored);
  if (!activeRows.length) { toast(t('import.toast.noActiveRows'), 'error'); return; }

  const profileKey  = document.getElementById('import-profile').value;
  const hasToStore  = activeRows.some(r => r._storeMapping);
  document.getElementById('static-next-btn').textContent =
    hasToStore ? t('import.staticPreview.nextBtn') : t('import.staticPreview.importBtn');

  // Build two-level tree: type → category
  const TYPE_ORDER = ['income', 'expense', 'deposit', 'transfer'];
  const groups = {};
  activeRows.forEach(row => {
    const type = row.type || 'expense';
    const cat  = row.category || 'other_expense';
    if (!groups[type])      groups[type] = {};
    if (!groups[type][cat]) groups[type][cat] = [];
    groups[type][cat].push(row);
  });

  let html = '';
  TYPE_ORDER.forEach(type => {
    if (!groups[type]) return;
    const allTypeRows = Object.values(groups[type]).flat();
    const typeCount   = allTypeRows.length;
    const currencies  = [...new Set(allTypeRows.map(r => r.currency))];
    const typeMeta    = currencies.length === 1
      ? `${typeCount} transactions · ${allTypeRows.reduce((s, r) => s + r.amount, 0).toLocaleString()} ${currencies[0]}`
      : `${typeCount} transactions`;

    html += `<div class="tree-group">
      <div class="tree-group-header" onclick="toggleTree(this)">
        <span class="tree-toggle">▼</span>
        <strong>${t('categories.' + type)}</strong>
        <span class="tree-meta">${typeMeta}</span>
      </div>
      <div class="tree-group-body">`;

    Object.entries(groups[type]).forEach(([cat, rows]) => {
      const catCount = rows.length;
      const catCurs  = [...new Set(rows.map(r => r.currency))];
      const catMeta  = catCurs.length === 1
        ? `${catCount} rows · ${rows.reduce((s, r) => s + r.amount, 0).toLocaleString()} ${catCurs[0]}`
        : `${catCount} rows`;

      html += `<div class="tree-cat">
        <div class="tree-cat-header" onclick="toggleTree(this)">
          <span class="tree-toggle">▼</span>
          <span>${Reports.categoryLabel(cat)}</span>
          <span class="tree-meta">${catMeta}</span>
        </div>
        <div class="tree-cat-body">
          <table class="tree-table">
            <thead><tr>
              <th>${t('import.col.date')}</th>
              <th>${t('import.col.description')}</th>
              <th>${t('import.col.property')}</th>
              <th>${t('import.col.notes')}</th>
              <th class="amount-cell">${t('import.col.amount')}</th>
            </tr></thead>
            <tbody>${rows.map(row => {
              const prop = State.properties.find(p => p.id === row.property_id);
              return `<tr>
                <td>${row.date}</td>
                <td style="font-size:12px;max-width:200px">${row.description}</td>
                <td style="font-size:12px">${prop ? prop.name : '—'}</td>
                <td style="font-size:12px">${row.notes || '—'}</td>
                <td class="amount-cell">${row.amount.toLocaleString()} ${row.currency}</td>
              </tr>`;
            }).join('')}</tbody>
          </table>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('import-static-body').innerHTML = html;
  document.getElementById('import-preview-section').style.display = 'none';
  document.getElementById('import-mapping-confirm-section').style.display = 'none';
  const section = document.getElementById('import-static-section');
  section.style.display = 'block';
  section.scrollIntoView({ behavior: 'smooth' });
}

function toggleTree(header) {
  const body    = header.nextElementSibling;
  const toggle  = header.querySelector('.tree-toggle');
  const isOpen  = body.style.display !== 'none';
  body.style.display  = isOpen ? 'none' : '';
  toggle.textContent  = isOpen ? '▶' : '▼';
}

function goToMappingConfirmOrImport() {
  const profileKey = document.getElementById('import-profile').value;
  const activeRows = State.importRows.filter(r => !r._ignored);
  const toStore    = activeRows.filter(r => r._storeMapping);

  if (!toStore.length) { doImport(false); return; }

  // Build mapping confirmation lists
  const existing = getDescMappings();
  const toAdd    = [];
  const toUpdate = [];

  toStore.forEach(row => {
    const keyword = (row.raw_description || row.description || '').trim();
    const found   = existing.find(m => m.bank_profile === profileKey && m.user_id === '' && m.keyword === keyword);
    if (found) {
      if (found.category !== row.category)
        toUpdate.push({ keyword, oldCat: found.category, newCat: row.category });
      // same category → no change, skip
    } else {
      toAdd.push({ keyword, category: row.category });
    }
  });

  const th = s => `<th style="text-align:left;padding:3px 8px;font-size:11px">${s}</th>`;
  const td = s => `<td style="padding:3px 8px;font-size:11px">${s}</td>`;
  let html = '';

  if (toAdd.length) {
    html += `<p style="font-size:13px;font-weight:500;margin-bottom:0.4rem">${t('import.mappingConfirm.newLabel', { count: toAdd.length })}</p>
      <div class="table-wrap" style="margin-bottom:1rem"><table><thead><tr>
        ${th(t('import.mappingConfirm.colDesc'))}${th(t('import.mappingConfirm.colCat'))}
      </tr></thead><tbody>
        ${toAdd.map(m => `<tr>${td(m.keyword)}<td style="padding:3px 8px"><span class="tag">${Reports.categoryLabel(m.category)}</span></td></tr>`).join('')}
      </tbody></table></div>`;
  }

  if (toUpdate.length) {
    html += `<p style="font-size:13px;font-weight:500;margin-bottom:0.4rem">${t('import.mappingConfirm.updateLabel', { count: toUpdate.length })}</p>
      <div class="table-wrap"><table><thead><tr>
        ${th(t('import.mappingConfirm.colDesc'))}${th(t('import.mappingConfirm.colWas'))}${th(t('import.mappingConfirm.colNow'))}
      </tr></thead><tbody>
        ${toUpdate.map(m => `<tr>${td(m.keyword)}
          <td style="padding:3px 8px"><span class="tag">${Reports.categoryLabel(m.oldCat)}</span></td>
          <td style="padding:3px 8px"><span class="tag">${Reports.categoryLabel(m.newCat)}</span></td>
        </tr>`).join('')}
      </tbody></table></div>`;
  }

  if (!toAdd.length && !toUpdate.length) {
    html = `<p style="font-size:13px;color:var(--text3)">${t('import.mappingConfirm.noChanges')}</p>`;
  }

  document.getElementById('import-mapping-confirm-body').innerHTML = html;
  document.getElementById('import-static-section').style.display = 'none';
  const s = document.getElementById('import-mapping-confirm-section');
  s.style.display = 'block';
  s.scrollIntoView({ behavior: 'smooth' });
}

async function doImport(saveMappings) {
  const profileKey = document.getElementById('import-profile').value;
  const activeRows = State.importRows.filter(r => !r._ignored);
  if (!activeRows.length) return;

  const missing = activeRows.filter(r => !r.property_id);
  if (missing.length) {
    if (!confirm(t('import.confirmMissing', { count: missing.length }))) return;
  }

  if (saveMappings) saveDescMappingsForRows(activeRows, profileKey);

  setLoading(true, t('status.importing'));
  try {
    // v2 mode: resolve property_id → account_id and create via backend API
    const toSave = activeRows.map(row => {
      const prop = State.properties.find(p => p.id === row.property_id);
      return {
        ...row,
        property_id: undefined, // remove field — backend uses account_id
        account_id: prop?.account_id ?? null,
      };
    });
    const result = await Api.createTransactionBatch(toSave);
    const batchId = result.batchId;
    // Backend doesn't return all transactions, so we'll refresh after import
    toast(t('import.toast.done', { count: activeRows.length, batchId }), 'success');
    State.importRows = [];
    clearImport();
    await refreshAll();
  } catch(e) {
    toast(t('import.toast.failed', { error: e.message }), 'error');
  }
  setLoading(false);
}

function setReportYear(year) {
  if (!year) { renderReports(); return; }
  document.getElementById('rep-from').value = `${year}-01-01`;
  document.getElementById('rep-to').value   = `${year}-12-31`;
  renderReports();
}

function setReportPeriod(preset) {
  document.getElementById('rep-year').value = '';
  const yr = new Date().getFullYear();
  if (preset === 'ytd') {
    document.getElementById('rep-from').value = `${yr}-01-01`;
    document.getElementById('rep-to').value   = new Date().toISOString().slice(0,10);
  } else if (preset === 'lastyear') {
    document.getElementById('rep-from').value = `${yr-1}-01-01`;
    document.getElementById('rep-to').value   = `${yr-1}-12-31`;
  } else {
    document.getElementById('rep-from').value = '';
    document.getElementById('rep-to').value   = '';
  }
  renderReports();
}

  document.getElementById('rep-income-cats').innerHTML = incCats.length

async function savePropertyModal() {
  const name = document.getElementById('apt-m-name').value.trim();
  if (!name) { toast(t('property.toast.nameReq'), 'error'); return; }
  const data = {
    name,
    address:     document.getElementById('apt-m-addr').value.trim(),
    country:     document.getElementById('apt-m-country').value,
    currency:    document.getElementById('apt-m-currency').value.trim().toUpperCase(),
    model:       document.getElementById('apt-m-model').value,
    rent:        parseFloat(document.getElementById('apt-m-rent').value)   || 0,

    lease_start: document.getElementById('apt-m-lease').value,
    notes:       document.getElementById('apt-m-notes').value.trim(),
    active:      true,
  };
  setLoading(true, t('status.saving'));

  setLoading(true, t('status.saving'));
  try {
    await Api.deleteProperty(id);
    await refreshAll();
    toast(t('property.toast.archived'), 'success');
  } catch(e) {
    toast(t('property.toast.saveFailed', { error: e.message }), 'error');

  setLoading(false);
}
